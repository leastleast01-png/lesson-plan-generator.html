<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lesson Plan Generator</title>

<style>
body{
  font-family:"Times New Roman", serif;
  background:#f4f6f9;
  padding:20px;
}
h1{text-align:center;}

input,select{
  width:100%;
  padding:6px;
  margin:4px 0 10px 0;
}

button{
  padding:8px 15px;
  margin:4px 4px 4px 0;
  background:#1e73be;
  color:white;
  border:none;
  cursor:pointer;
}

.output{
  margin-top:30px;
  background:white;
  padding:40px;
  border:1px solid #ccc;
}

@media print{
  body *{ visibility:hidden; }
  .output, .output *{ visibility:visible; }
  .output{ position:absolute; left:0; top:0; width:100%; }
}
</style>
</head>

<body>

<h1>Lesson Plan Generator</h1>

<input id="school" placeholder="School Name">
<input id="teacher" placeholder="Teacher Name">

<select id="term">
<option value="">Select Term</option>
<option>I</option>
<option>II</option>
<option>III</option>
</select>

<input id="date" type="date">
<input id="subject" placeholder="Subject">
<input id="class">
<input id="unitNo" placeholder="Unit Number">
<input id="lessonNo" placeholder="Lesson Number">
<input id="totalLessons" placeholder="Total Lessons">
<input id="classSize" placeholder="Class Size">
<input id="unitTitle" placeholder="Unit Title">
<input id="specialNeeds" placeholder="Special Needs (leave blank if none)">
<input id="competence" placeholder="Key Unit Competence">
<input id="lessonTitle" placeholder="Lesson Title">

<select id="objectiveVerb">
<option>define</option>
<option>identify</option>
<option>describe</option>
<option>give</option>
<option>state</option>
<option>talk</option>
<option>present</option>
<option>explain</option>
</select>

<select id="location">
<option>Inside</option>
<option>Outside</option>
</select>

<input id="materials" placeholder="Learning Materials">
<input id="grade" placeholder="Grade Number">
<input id="page" placeholder="Page Number">

<br>

<button onclick="generateLesson()">Generate</button>
<button onclick="downloadWord()">Download Word</button>
<button onclick="window.print()">Download PDF / Print</button>
<button onclick="saveLesson()">Save</button>
<button onclick="loadLesson()">Load</button>
<button onclick="copyLesson()">Copy</button>

<div class="output" id="output"></div>

<script>

let generatedContent="";

function generateLesson(){

const specialNeeds=document.getElementById("specialNeeds").value || "None";

generatedContent=`
<h2 style="text-align:center;">LESSON PLAN</h2>

<b>School name:</b> ${school.value} &nbsp;&nbsp;&nbsp;
<b>Teacher's name:</b> ${teacher.value}

<br><br>

Term<br>
Date<br>
Subject<br>
Class<br>
Unit NO<br>
Lesson NO<br>
Duration<br>
Class Size<br><br>

${term.value}<br>
${date.value}<br>
${subject.value}<br>
${class.value}<br>
${unitNo.value}<br>
${lessonNo.value} out of ${totalLessons.value}<br>
40 minutes<br>
${classSize.value}<br><br>

<b>Type of Special Educational Needs:</b><br>
${specialNeeds}<br><br>

<b>Unit title</b><br>
${unitTitle.value}<br><br>

<b>Key unit competence</b><br>
${competence.value}<br><br>

<b>Title of the lesson</b><br>
${lessonTitle.value}<br><br>

<b>Instructional objective</b><br>
By using ${materials.value} at the end of this lesson learners will be able to ${objectiveVerb.value} ${lessonTitle.value} effectively.<br><br>

<b>Plan for this class</b><br>
${location.value}<br><br>

<b>Learning Materials</b><br>
${materials.value}<br><br>

<b>References</b><br>
Learner's book P${grade.value} on page ${page.value}.<br><br>

<b>Introduction – 5 min</b><br>
Greet learners.<br>
Recall previous lesson about ${lessonTitle.value}.<br><br>

<b>Development – 25 min</b><br>
Demonstrate materials.<br>
Summarize key concepts about ${lessonTitle.value}.<br><br>

<b>Conclusion – 10 min</b><br>
Assess learners about ${lessonTitle.value}.<br><br>

<b>Teacher's self-evaluation</b><br>
.........................................
`;

document.getElementById("output").innerHTML=generatedContent;
}

function downloadWord(){
const blob=new Blob([generatedContent],{type:"application/msword"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="lesson-plan.doc";
link.click();
}

function saveLesson(){
localStorage.setItem("lesson",generatedContent);
alert("Saved.");
}

function loadLesson(){
const saved=localStorage.getItem("lesson");
if(saved){
document.getElementById("output").innerHTML=saved;
generatedContent=saved;
}
}

function copyLesson(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("Copied.");
}

</script>

</body>
</html>
